name: Advanced CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }}
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # 🚀 Cache dependencies
      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      # 🧪 Run tests
      - name: Run Tests
        run: npx test

      # 🔐 Dependency security scan
      - name: Run npm audit
        run: npm audit --audit-level=high

      # 🐳 Build Docker image
      - name: Build Docker Image
        run: docker build -t budget-app .

      # 🔑 Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 📦 Push image
      - name: Push Docker Image
        run: |
          docker tag budget-app ${{ secrets.DOCKER_USERNAME }}/budget-app
          docker push ${{ secrets.DOCKER_USERNAME }}/budget-app

      # 🔐 Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      # 🔍 Scan container
      - name: Scan Docker Image
        run: |
          trivy image --severity HIGH,CRITICAL --scanners vuln ${{ secrets.DOCKER_USERNAME }}/budget-app

      # 🚀 Deploy simulation
      - name: Deploy
        run: echo "Deploying application..."